<!DOCTYPE html>
<html>
<head>
    <title>Edit Vehicle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center text-warning">Edit Vehicle</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Owner Name</label>
                <input type="text" name="owner_name" class="form-control"
                       value="{{ vehicle.owner_name }}">
            </div>

            <div class="mb-3">
                <label>Vehicle Number</label>
                <input type="text" name="vehicle_number" class="form-control"
                       value="{{ vehicle.vehicle_number }}">
            </div>

            <div class="mb-3">
                <label>Vehicle Type</label>

                <select name="vehicle_type" class="form-control">
                    <option value="Bike" {% if vehicle.vehicle_type == "Bike" %}selected{% endif %}>Bike</option>
                    <option value="Car" {% if vehicle.vehicle_type == "Car" %}selected{% endif %}>Car</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Phone Number</label>
                <input type="text" name="phone_number" class="form-control"
                       value="{{ vehicle.phone_number }}">
            </div>

            <div class="mb-3">
                <label>Parking Slot</label>
                <input type="text" name="parking_slot" class="form-control"
                       value="{{ vehicle.parking_slot }}">
            </div>

            <button type="submit" class="btn btn-warning w-100">
                Update Vehicle
            </button>

        </form>

    </div>

</div>

</body>
</html>
