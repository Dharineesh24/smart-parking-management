{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-warning">
            <h3>🔒 Change Password</h3>
        </div>

        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}

                <button class="btn btn-success">
                    Update Password
                </button>

                <a href="{% url 'profile' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
